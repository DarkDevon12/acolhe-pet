<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="./images/paw (1).png" type="image/png">
    <link rel="stylesheet" href="./style.css">

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />

</head>

<body>
    <div class="container">
        <div class="card">
            <h2>Acolhe Pet</h2>


            <form class="form" id="formLogin">


                <input id="emailLogin" type="email" placeholder="Email">

                <input id="senhaLogin" type="password" placeholder="Senha">

                <p class="forgot-password">
                    <a href="#">Esqueceu sua senha?</a>
                </p>

                <button type="submit">Fazer login</button>
            </form>

            <div class="tabs">
                <p>
                    Não possui Cadastro?
                    <a href="index.html" class="login-link">Cadastre-se</a>
                </p>
            </div>

        </div>
    </div>


    <script src="./script.js"></script>
</body>

</html>
