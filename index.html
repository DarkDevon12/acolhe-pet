<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acolhe Pet</title>
    <link rel="shortcut icon" href="./images/icone-pag.png" type="image/png">
    <link rel="stylesheet" href="./css/style.css">
    
</head>

<body>
    <div class="container">
        <div class="card">
            <h2>Acolhe Pet</h2>


            <form class="form" id="formCadastro">

                <input id="nome" type="text" placeholder="Nome">
                <input id="email" type="email" placeholder="Email">
                <input id="telefone" type="tel" placeholder="Telefone">
                <input id="cidade" type="text" placeholder="Cidade">
                <input id="senha" type="password" placeholder="Senha">

                <button type="submit">Cadastrar</button>
            </form>

            <div class="tabs">
                <p>
                    Já possui login?
                    <a href="login.html" class="login-link">Fazer login</a>
                </p>
            </div>

        </div>
    </div>

    <script src="./js/script.js"></script>
</body>

</html>
